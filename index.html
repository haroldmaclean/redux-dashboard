<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redux Dashboard</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Redux Dashboard</h1>

      <!-- ================= Counter ================= -->
      <div class="dashboard-grid">
        <section class="card">
          <h2>Counter</h2>
          <p class="count">
            count:
            <span id="count-value">0</span>
          </p>

          <div class="buttons">
            <button id="increment-btn">+</button>
            <button id="decrement-btn">-</button>
            <button id="reset-btn">Reset</button>
          </div>

          <div class="increment-container">
            <input type="number" id="amount-input" />
            <button id="increase-btn">Increase</button>
          </div>
        </section>
        <!-- ================= User ================= -->

        <section class="card">
          <h2>User</h2>
          <input
            type="text"
            id="username-input"
            placeholder="Enter your name"
          />

          <div class="buttons">
            <button id="login-btn">Login</button>
            <button id="logout-btn">Logout</button>
          </div>
          <p>
            Name:
            <strong id="user-name"> None </strong>
          </p>
          <p>
            Status:
            <strong id="login-status"> Logged Out </strong>
          </p>
        </section>

        <!-- ================= Cart ================= -->

        <section class="card">
          <h2>Shopping Cart</h2>
          <p>
            Total Items:
            <strong id="cart-count">0</strong>
          </p>

          <p>
            Total Price:
            <strong id="cart-total">$0.00</strong>
          </p>

          <div class="buttons">
            <button id="add-laptop-btn">Add Laptop</button>
            <button id="add-mouse-btn">Add Mouse</button>
            <button id="clear-cart-btn">Clear Cart</button>
          </div>
          <p id="empty-cart-message">🛒 Your cart is empty.</p>

          <ul id="cart-items"></ul>
        </section>

        <!-- PASTE THIS DIRECTLY NEXT TO OR BELOW YOUR CART SECTION -->
        <section class="card">
          <h2>Wishlist</h2>

          <p id="empty-wishlist-message">❤️ Your wishlist is empty.</p>

          <ul id="wishlist-items"></ul>
        </section>

        <section class="card">
          <h2>Products</h2>
          <!-- 🟢 STEP 1: Wrap your 3 inputs inside this new flex container -->
          <div class="filter-bar">
            <input id="search-input" placeholder="Search products..." />
            <select id="category-filter">
              <option value="all">All Categories</option>
            </select>

            <select id="sort-products">
              <option value="price-low-high">Price: Low → High</option>
              <option value="price-high-low">Price: High → Low</option>
              <option value="rating">Rating</option>
              <option value="stock">Stock</option>
              <option value="name-a-z">Name A → Z</option>
              <option value="name-z-a">Name Z → A</option>
            </select>
          </div>

          <div id="loading-spinner"></div>

          <p id="loading-message"></p>

          <p id="error-message"></p>

          <ul id="product-list"></ul>
        </section>

        <section class="card">
          <h2>Redux State</h2>

          <pre id="redux-state"></pre>
        </section>
      </div>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
